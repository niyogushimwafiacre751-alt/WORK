<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange</title>


    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            padding: 0;
        }

        .header {
            background: #0b0b5c;
            color: white;
            text-align: center;
            padding: 40px 0;
        }

        .header h1 {
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: -50px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 600px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .col {
            width: 30%;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            background: #0b0b5c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>XYZ-COMPANY</h1>
        <p>CURRENCY EXCHANGE PLATFORM</p>
    </div>

    <div class="container">
        <div class="card">

            <div class="row">
                <div class="col">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" value="100">
                </div>

                <div class="col">
                    <label for="from">From</label>
                    <select id="from">
                        <option value="USD">USD - $</option>
                        <option value="RWF">RWF</option>
                    </select>
                </div>

                <div class="col">
                    <label for="to">To</label>
                    <select id="to">
                        <option value="RWF">RWF</option>
                        <option value="USD">USD - $</option>
                    </select>
                </div>
            </div>

            <button onclick="convert()">Convert</button>

            <div class="result" id="result">
                Result: 0
            </div>

        </div>
    </div>
</body>

</html>
<script>

    function convert() {
        let amount = document.getElementById("amount").value;
        let from = document.getElementById("from").value;
        let to = document.getElementById("to").value;

        let rate = 1030; // example rate
        let result = 0;

        if (from === "USD" && to === "RWF") {
            result = amount * rate;
        } else if (from === "RWF" && to === "USD") {
            result = amount / rate;
        } else {
            result = amount;
        }

        document.getElementById("result").innerText =
            "Result: " + result.toLocaleString();
    }

</script>
</body>

</html>
